apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-gateway
  namespace: sandbox-system
  labels:
    component: sandbox-manager
    app.kubernetes.io/name: sandbox-gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-gateway
      component: sandbox-manager
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-gateway
        component: sandbox-manager
    spec:
      serviceAccountName: sandbox-gateway
      containers:
        - name: sandbox-gateway
          image: "sandbox-gateway:latest"
          imagePullPolicy: IfNotPresent
          command:
            - envoy
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - -l
            - warn
            - --concurrency
            - "2"
            - --drain-time-s
            - "30"
          lifecycle:
            preStop:
              exec:
                command:
                - sh
                - -c
                - |
                  curl -s -X POST http://localhost:9901/drain_listeners?graceful
                  sleep 30
          env:
            - name: GOMAXPROCS
              value: "2"
            - name: PEER_NAMESPACE
              value: "sandbox-system"
            - name: PEER_LABEL_SELECTOR
              value: "component=sandbox-manager"
          ports:
            - name: http
              containerPort: 7788
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 7788
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 7788
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sandbox-gateway
                    app.kubernetes.io/instance: sandbox-manager
                topologyKey: kubernetes.io/hostname
