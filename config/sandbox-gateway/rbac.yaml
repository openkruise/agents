apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-gateway
  labels:
    app.kubernetes.io/name: sandbox-gateway
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: ["agents.kruise.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agents.kruise.io"]
    resources: ["sandboxes/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-gateway
  labels:
    app.kubernetes.io/name: sandbox-gateway
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-gateway
subjects:
  - kind: ServiceAccount
    name: sandbox-gateway
    namespace: sandbox-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-gateway-system-key
  namespace: sandbox-system
  labels:
    app.kubernetes.io/name: sandbox-gateway
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["e2b-connect-system-key-store"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-gateway-system-key
  namespace: sandbox-system
  labels:
    app.kubernetes.io/name: sandbox-gateway
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-gateway-system-key
subjects:
  - kind: ServiceAccount
    name: sandbox-gateway
    namespace: sandbox-system
