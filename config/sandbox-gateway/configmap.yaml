apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: sandbox-system
  labels:
    app.kubernetes.io/name: sandbox-gateway
    app.kubernetes.io/managed-by: kustomize
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 10000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: original_dst_cluster
                    http_filters:
                      - name: envoy.filters.http.golang
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.golang.v3alpha.Config
                          library_id: sandbox-gateway
                          library_path: /etc/envoy/sandbox-gateway.so
                          plugin_name: sandbox-gateway
                          plugin_config:
                            "@type": type.googleapis.com/xds.type.v3.TypedStruct
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: original_dst_cluster
          type: ORIGINAL_DST
          lb_policy: CLUSTER_PROVIDED
          connect_timeout: 5s
          original_dst_lb_config:
            metadata_key:
              key: "envoy.lb.original_dst"
              path:
              - key: "host"
          circuit_breakers:
            thresholds:
            - priority: DEFAULT
              max_connections: 32768
              max_pending_requests: 32768
              max_requests: 65536
              max_retries: 5
