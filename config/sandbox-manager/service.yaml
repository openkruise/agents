apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: sandbox-system
  labels:
    component: sandbox-manager
    app.kubernetes.io/name: sandbox-manager
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  ports:
    - port: 7788
      targetPort: 7788
      protocol: TCP
      name: http-envoy
    - name: manager
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: grpc-extproc
      protocol: TCP
      port: 9002
      targetPort: 9002
  selector:
    component: sandbox-manager
    app.kubernetes.io/name: sandbox-manager
