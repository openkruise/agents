apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
  annotations:
    "template": ""
webhooks:
  - name: md-sbs.kb.io
    clientConfig:
      service:
        name: sandbox-controller-manager-webhook-service
        namespace: sandbox-system
  - name: md-sbt.kb.io
    clientConfig:
      service:
        name: sandbox-controller-manager-webhook-service
        namespace: sandbox-system
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    "template": ""
webhooks:
  - name: v-sbs.kb.io
    clientConfig:
      service:
        name: sandbox-controller-manager-webhook-service
        namespace: sandbox-system
  - name: v-sbt.kb.io
    clientConfig:
      service:
        name: sandbox-controller-manager-webhook-service
        namespace: sandbox-system
  - name: v-pod-delete.kb.io
    clientConfig:
      service:
        name: sandbox-controller-manager-webhook-service
        namespace: sandbox-system
    objectSelector:
      matchExpressions:
        - key: agents.kruise.io/created-by
          operator: In
          values:
            - sandbox
  - name: v-pod-eviction.kb.io
    clientConfig:
      service:
        name: sandbox-controller-manager-webhook-service
        namespace: sandbox-system
