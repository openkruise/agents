name: Build and push commit-job

on:
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.HUB_KRUISE }}
      - name: Build and push the Docker image
        run: |
          docker buildx create --use --platform=linux/amd64,linux/arm64 --name multi-platform-builder
          docker buildx build --platform=linux/amd64,linux/arm64 \
            -f dockerfiles/commit-job.Dockerfile \
            --build-arg NERDCTL_BRANCH=v2.0.0 \
            -t openkruise/commit-job:${{ github.ref_name }} \
            --push .
