coverage:
  status:
    patch:
      default:
        # Wiring code (cmd/* entry points, SetupWithManager / Add registration
        # plumbing) is not realistically unit-testable without envtest. Allow
        # patches to fall up to 25 percentage points below the project baseline
        # before failing. Project status remains strict.
        target: auto
        threshold: 25%

ignore:
- "pkg/client/.*"
- "test/e2e/.*"
- "cmd/.*"
