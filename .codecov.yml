coverage:
  status:
    project:
      default:
        # Allow tiny project-coverage regressions (< 0.5pp) so refactors that
        # touch wiring layers don't fail the status. Substantive drops still
        # surface in the codecov report.
        target: auto
        threshold: 0.5%
    patch:
      default:
        # Wiring code (cmd/* entry points, SetupWithManager / Add registration
        # plumbing) is not realistically unit-testable without envtest. Allow
        # patches to fall up to 10 percentage points below the project baseline
        # before failing.
        target: auto
        threshold: 10%

ignore:
- "pkg/client/.*"
- "test/e2e/.*"
- "cmd/.*"
